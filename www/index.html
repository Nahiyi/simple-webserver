<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Simple Web Server</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 600px;
        }
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 1.2em;
            line-height: 1.8;
            margin-bottom: 16px;
        }
        .info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }
        .info p {
            margin: 8px 0;
            font-size: 1em;
        }
        .badge {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome!</h1>
        <p>这是简单Web服务器提供的默认首页</p>
        <p>当前时间: <strong id="time"></strong></p>
        <p>服务器状态: <span class="badge">运行中</span></p>
        <div class="info">
            <p><strong>资源目录:</strong> /root</p>
            <p><strong>服务器:</strong> Go HTTP Server</p>
        </div>
    </div>
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
        setInterval(() => {
            document.getElementById('time').textContent = new Date().toLocaleString('zh-CN');
        }, 1000);
    </script>
</body>
</html>
