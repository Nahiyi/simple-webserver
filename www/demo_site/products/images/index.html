<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图片资源</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; background: #f5f5f5; }
        h1 { color: #18A058; }
        .back { margin-bottom: 20px; }
        .back a { color: #666; text-decoration: none; }
        .gallery { background: #fff; padding: 20px; border-radius: 8px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .img-box { aspect-ratio: 1; background: #eee; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .img-box span { color: #999; font-size: 12px; }
        .img-box svg { width: 50px; height: 50px; }
    </style>
</head>
<body>
    <div class="back"><a href="../index.html">← 返回产品列表</a></div>
    <h1>图片资源</h1>
    <p>当前路径: /demo_site/products/images/index.html</p>
    <div class="gallery">
        <div class="img-box">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="40" fill="#18A058"/>
                <text x="50" y="55" text-anchor="middle" fill="white" font-size="12">SVG</text>
            </svg>
        </div>
        <div class="img-box"><span>logo.png</span></div>
        <div class="img-box"><span>banner.jpg</span></div>
        <div class="img-box"><span>icon.gif</span></div>
        <div class="img-box"><span>bg.webp</span></div>
        <div class="img-box"><span>photo.bmp</span></div>
    </div>
    <p style="margin-top: 20px; color: #666; text-align: center;">
        图片文件会在浏览器中直接显示，而非下载
    </p>
</body>
</html>
