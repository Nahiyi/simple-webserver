<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web服务器管理面板</title>
    <style>
        :root {
            --primary: #18A058;
            --primary-dark: #14803c;
            --primary-light: #e8f5ee;
            --primary-border: #a3d9b8;
            --bg-page: #f5f7f9;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border-color: #e4e7eb;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* 页面标题 */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* 卡片样式 */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--primary);
            border-radius: 2px;
        }

        /* 状态网格 */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .status-item {
            background: var(--primary-light);
            border-radius: var(--radius-md);
            padding: 20px;
            text-align: center;
            border: 1px solid var(--primary-border);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .status-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .status-item .label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .status-item .value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .status-item .value.stopped {
            color: var(--text-muted);
        }

        .status-item .value.running {
            color: var(--primary);
        }

        /* 信息区域 */
        .info-row {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .info-item {
            flex: 1;
            min-width: 200px;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
            word-break: break-all;
        }

        /* 按钮样式 */
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
            min-width: 100px;
        }

        .btn:focus-visible {
            box-shadow: 0 0 0 3px rgba(24, 160, 88, 0.3);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(24, 160, 88, 0.3);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #c82333;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e8e8e8;
            border-color: #d0d0d0;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 表单样式 */
        .config-form {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 200px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-card);
            color: var(--text-primary);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(24, 160, 88, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        /* 日志表格 */
        .logs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .logs-meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        .logs-actions {
            display: flex;
            gap: 8px;
        }

        .logs-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .logs-table th {
            text-align: left;
            padding: 12px 16px;
            background: var(--bg-page);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
        }

        .logs-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .logs-table tr:hover td {
            background: var(--primary-light);
        }

        .logs-table tr:last-child td {
            border-bottom: none;
        }

        /* 状态标签 */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .status-badge.success {
            background: #d4edda;
            color: #155724;
        }

        .status-badge.warning {
            background: #fff3cd;
            color: #856404;
        }

        .status-badge.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status-badge.info {
            background: var(--primary-light);
            color: var(--primary-dark);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 14px 20px;
            border-radius: var(--radius-md);
            color: white;
            font-weight: 500;
            font-size: 14px;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.3s;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }

        .toast.success {
            background: var(--primary);
        }

        .toast.error {
            background: #dc3545;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-page);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* 表格容器 */
        .table-container {
            max-height: 400px;
            overflow-y: auto;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1 class="page-title">Web服务器管理面板</h1>
            <p class="page-subtitle">简单多线程Web服务器 · Go语言实现</p>
        </div>

        <!-- 服务器状态卡片 -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">服务器状态</h2>
                <span id="status-indicator" class="status-badge info">监测中</span>
            </div>
            <div class="status-grid">
                <div class="status-item">
                    <div class="label">运行状态</div>
                    <div class="value" id="status-value">--</div>
                </div>
                <div class="status-item">
                    <div class="label">Web端口</div>
                    <div class="value" id="port-value">--</div>
                </div>
                <div class="status-item">
                    <div class="label">当前连接</div>
                    <div class="value" id="connections-value">0</div>
                </div>
                <div class="status-item">
                    <div class="label">访问日志</div>
                    <div class="value" id="logs-value">0</div>
                </div>
            </div>
            <div class="info-row">
                <div class="info-item">
                    <div class="info-label">资源根目录</div>
                    <div class="info-value" id="root-dir">--</div>
                </div>
                <div class="info-item">
                    <div class="info-label">管理端口</div>
                    <div class="info-value" id="admin-port">--</div>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="btn-start" onclick="startServer()">
                    <span>启动服务器</span>
                </button>
                <button class="btn btn-danger" id="btn-stop" onclick="stopServer()">
                    <span>停止服务器</span>
                </button>
                <button class="btn btn-secondary" onclick="refreshStatus()">
                    <span>刷新状态</span>
                </button>
            </div>
        </div>

        <!-- 服务器配置卡片 -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">服务器配置</h2>
            </div>
            <div class="config-form">
                <div class="form-group">
                    <label for="config-port">Web服务端口</label>
                    <input type="number" id="config-port" min="1" max="65535" placeholder="8080">
                </div>
                <div class="form-group">
                    <label for="config-root">资源根目录</label>
                    <input type="text" id="config-root" placeholder="/root">
                </div>
                <button class="btn btn-primary" onclick="updateConfig()">保存配置</button>
            </div>
        </div>

        <!-- 访问日志卡片 -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">访问日志</h2>
            </div>
            <div class="logs-header">
                <span class="logs-meta">最后更新: <span id="last-update">--</span></span>
                <div class="logs-actions">
                    <button class="btn btn-secondary" onclick="toggleAutoRefresh()">
                        <span id="auto-refresh-text">自动刷新: 开</span>
                    </button>
                    <button class="btn btn-secondary" onclick="refreshLogs()">刷新</button>
                    <button class="btn btn-danger" onclick="clearLogs()">清空</button>
                </div>
            </div>
            <div class="table-container">
                <div id="logs-container">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>

    <script>
        let autoRefresh = true;
        let refreshInterval;

        // 显示提示消息
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 获取状态
        async function refreshStatus() {
            try {
                const resp = await fetch('/api/status');
                const data = await resp.json();
                if (data.success) {
                    const status = data.data;

                    // 更新状态显示
                    const statusText = status.running ? '运行中' : '已停止';
                    document.getElementById('status-value').textContent = statusText;
                    document.getElementById('status-value').className = 'value ' + (status.running ? 'running' : 'stopped');

                    // 更新状态指示器
                    const indicator = document.getElementById('status-indicator');
                    if (status.running) {
                        indicator.textContent = '运行中';
                        indicator.className = 'status-badge success';
                    } else {
                        indicator.textContent = '已停止';
                        indicator.className = 'status-badge warning';
                    }

                    document.getElementById('port-value').textContent = status.port;
                    document.getElementById('connections-value').textContent = status.connections;
                    document.getElementById('logs-value').textContent = status.logCount;
                    document.getElementById('root-dir').textContent = status.rootDir;
                    document.getElementById('admin-port').textContent = status.adminPort;

                    // 更新按钮状态
                    document.getElementById('btn-start').disabled = status.running;
                    document.getElementById('btn-stop').disabled = !status.running;

                    // 只在用户未聚焦输入框时才更新值
                    const portInput = document.getElementById('config-port');
                    const rootInput = document.getElementById('config-root');
                    if (!portInput.matches(':focus')) portInput.value = status.port;
                    if (!rootInput.matches(':focus')) rootInput.value = status.rootDir;
                }
            } catch (e) {
                console.error('获取状态失败:', e);
            }
        }

        // 启动服务器
        async function startServer() {
            try {
                const resp = await fetch('/api/start', { method: 'POST' });
                const data = await resp.json();
                showToast(data.message, data.success ? 'success' : 'error');
                if (data.success) {
                    refreshStatus();
                    refreshLogs();
                }
            } catch (e) {
                showToast('启动失败', 'error');
            }
        }

        // 停止服务器
        async function stopServer() {
            try {
                const resp = await fetch('/api/stop', { method: 'POST' });
                const data = await resp.json();
                showToast(data.message, data.success ? 'success' : 'error');
                if (data.success) {
                    refreshStatus();
                }
            } catch (e) {
                showToast('停止失败', 'error');
            }
        }

        // 更新配置
        async function updateConfig() {
            const port = parseInt(document.getElementById('config-port').value);
            const rootDir = document.getElementById('config-root').value;

            try {
                const resp = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ port, rootDir })
                });
                const data = await resp.json();
                showToast(data.message, data.success ? 'success' : 'error');
                if (data.success) {
                    refreshStatus();
                }
            } catch (e) {
                showToast('配置失败', 'error');
            }
        }

        // 刷新日志
        async function refreshLogs() {
            try {
                const resp = await fetch('/api/logs');
                const data = await resp.json();
                if (data.success) {
                    renderLogs(data.data.logs);
                    document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
                }
            } catch (e) {
                console.error('获取日志失败:', e);
            }
        }

        // 渲染日志表格
        function renderLogs(logs) {
            const container = document.getElementById('logs-container');
            if (!logs || logs.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无访问日志</div>';
                return;
            }

            let html = `
                <table class="logs-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>客户端IP</th>
                            <th>方法</th>
                            <th>URL</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            logs.forEach(log => {
                const statusClass = log.Status >= 200 && log.Status < 300 ? 'success' :
                                   log.Status >= 400 && log.Status < 500 ? 'warning' : 'error';
                html += `
                    <tr>
                        <td>${log.Time}</td>
                        <td>${log.ClientIP}</td>
                        <td><span class="status-badge info">${log.Method}</span></td>
                        <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${log.URL}</td>
                        <td><span class="status-badge ${statusClass}">${log.Status}</span></td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // 清空日志
        async function clearLogs() {
            if (!confirm('确定要清空所有日志吗？')) return;
            try {
                const resp = await fetch('/api/logs/clear', { method: 'POST' });
                const data = await resp.json();
                showToast(data.message, data.success ? 'success' : 'error');
                if (data.success) {
                    refreshLogs();
                    refreshStatus();
                }
            } catch (e) {
                showToast('清空失败', 'error');
            }
        }

        // 切换自动刷新
        function toggleAutoRefresh() {
            autoRefresh = !autoRefresh;
            document.getElementById('auto-refresh-text').textContent = '自动刷新: ' + (autoRefresh ? '开' : '关');
            if (autoRefresh) {
                startAutoRefresh();
            } else {
                clearInterval(refreshInterval);
            }
        }

        // 启动自动刷新
        function startAutoRefresh() {
            clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                if (autoRefresh) {
                    refreshStatus();
                    refreshLogs();
                }
            }, 2000);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            refreshStatus();
            refreshLogs();
            startAutoRefresh();
        });
    </script>
</body>
</html>
